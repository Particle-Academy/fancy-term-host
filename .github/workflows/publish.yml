name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      # BOOTSTRAP (first publish only): npm won't let a Trusted Publisher be
      # configured for a package that doesn't exist yet, so the very first
      # release authenticates with a short-lived granular NPM_TOKEN secret.
      # After v0.1.0 lands: add the Trusted Publisher on npmjs, revoke the
      # token, and delete the `env:` block below to revert to tokenless OIDC.
      # Requires npm 11.5.1+ for provenance (the runner ships npm 10.x) → npx.
      - name: Publish
        run: npx -y npm@latest publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
